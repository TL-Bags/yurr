<!DOCTYPE html>
<html>
<head>
  <title>Imposter Word Game</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    #menu, #room {
      margin-top: 50px;
    }

    input {
      padding: 8px;
      font-size: 16px;
      margin: 5px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }

    /* Player list box */
    #playerBox {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      border: 1px solid #ccc;
      padding: 10px 15px;
      width: 180px;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      text-align: left;
    }

    #playerBox h3 {
      margin-top: 0;
      font-size: 18px;
      text-align: center;
    }

    #results {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>Imposter Word Game</h1>

<!-- MENU -->
<div id="menu">
  <input id="nameInput" placeholder="Your name">
  <br><br>

  <button onclick="createRoom()">Create Room</button>
  <br><br>

  <input id="roomCodeInput" placeholder="Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<!-- ROOM -->
<div id="room" style="display:none;">

  <h2>Room: <span id="roomCode"></span></h2>

  <!-- Player list box -->
  <div id="playerBox">
    <h3>Players</h3>
    <div id="playerList"></div>
  </div>

  <button id="startBtn" onclick="startRound()">Start Round</button>

  <h2 id="roleDisplay"></h2>
  <h3 id="wordDisplay"></h3>

  <div id="clueSection" style="display:none;">
    <input id="clueInput" placeholder="Enter your clue">
    <button onclick="submitClue()">Submit</button>
  </div>

  <div id="clueList"></div>

  <div id="voteSection" style="display:none;">
    <h3>Vote for the Imposter</h3>
    <div id="voteButtons"></div>
  </div>

  <div id="results"></div>
</div>

<script>
const socket = io();
let currentRoom = "";

// CREATE ROOM
function createRoom() {
  const name = document.getElementById("nameInput").value;
  socket.emit("createRoom", name);
}

socket.on("roomCreated", (code) => {
  currentRoom = code;
  document.getElementById("menu").style.display = "none";
  document.getElementById("room").style.display = "block";
  document.getElementById("roomCode").innerText = code;
});

// JOIN ROOM
function joinRoom() {
  const name = document.getElementById("nameInput").value;
  const code = document.getElementById("roomCodeInput").value.toUpperCase();
  socket.emit("joinRoom", { name, code });
}

socket.on("joinedRoom", (code) => {
  currentRoom = code;
  document.getElementById("menu").style.display = "none";
  document.getElementById("room").style.display = "block";
  document.getElementById("roomCode").innerText = code;
});

// UPDATE PLAYER LIST
socket.on("players", (players) => {
  let html = "";
  for (const id in players) {
    html += `<p>${players[id].name}</p>`;
  }
  document.getElementById("playerList").innerHTML = html;
});

// START ROUND
function startRound() {
  socket.emit("startRound", currentRoom);
}

socket.on("role", (data) => {
  document.getElementById("startBtn").style.display = "none";

  if (data.role === "crewmate") {
    document.getElementById("roleDisplay").innerText = "You are a Crewmate";
    document.getElementById("wordDisplay").innerText = "Word: " + data.word;
  } else {
    document.getElementById("roleDisplay").innerText = "You are the Imposter";
    document.getElementById("wordDisplay").innerText = "Hint: " + data.hint;
  }

  document.getElementById("clueSection").style.display = "block";
});

// SUBMIT CLUE
function submitClue() {
  const clue = document.getElementById("clueInput").value;
  socket.emit("submitClue", { code: currentRoom, clue });

  // Hide role + word/hint after submitting
  document.getElementById("roleDisplay").style.display = "none";
  document.getElementById("wordDisplay").style.display = "none";
}

socket.on("allClues", (players) => {
  document.getElementById("clueSection").style.display = "none";

  let html = "<h3>Clues:</h3>";
  for (const id in players) {
    html += `<p>${players[id].name}: ${players[id].clue}</p>`;
  }
  document.getElementById("clueList").innerHTML = html;

  document.getElementById("voteSection").style.display = "block";
  const voteDiv = document.getElementById("voteButtons");
  voteDiv.innerHTML = "";

  for (const id in players) {
    voteDiv.innerHTML += `<button onclick="vote('${id}')">${players[id].name}</button><br>`;
  }
});

// VOTE
function vote(id) {
  socket.emit("submitVote", { code: currentRoom, voteId: id });
}

socket.on("results", (data) => {
  const { votedOut, imposterId, players } = data;

  let text = `<h2>Results</h2>`;
  text += `<p>Voted Out: ${players[votedOut].name}</p>`;
  text += `<p>Imposter Was: ${players[imposterId].name}</p>`;

  if (votedOut === imposterId) {
    text += `<h3>Crewmates Win!</h3>`;
  } else {
    text += `<h3>Imposter Wins!</h3>`;
  }

  document.getElementById("results").innerHTML = text;
});
</script>

</body>
</html>
