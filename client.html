<!DOCTYPE html>
<html>
<head>
  <title>Imposter Word Game</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    #menu, #room {
      margin-top: 50px;
    }

    input {
      padding: 8px;
      font-size: 16px;
      margin: 5px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }

    /* Player list box */
    #playerBox {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      border: 1px solid #ccc;
      padding: 10px 15px;
      width: 180px;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      text-align: left;
    }

    #playerBox h3 {
      margin-top: 0;
      font-size: 18px;
      text-align: center;
    }

    /* Results slide-down panel */
    #resultsPanel {
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      background: white;
      padding: 40px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: top 0.8s ease;
      font-size: 22px;
    }

    #resultsPanel.show {
      top: 0;
    }
  </style>
</head>

<body>

<h1>Imposter</h1>

<!-- MENU -->
<div id="menu">
  <input id="nameInput" placeholder="Your name">
  <br><br>

  <button onclick="createRoom()">Create Room</button>
  <br><br>

  <input id="roomCodeInput" placeholder="Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<!-- ROOM -->
<div id="room" style="display:none;">

  <h2>Room: <span id="roomCode"></span></h2>

  <!-- Player list box -->
  <div id="playerBox">
    <h3>Players</h3>
    <div id="playerList"></div>
  </div>

  <button id="startBtn" onclick="startRound()">Start Round</button>

  <h2 id="roleDisplay"></h2>
  <h3 id="wordDisplay"></h3>

  <div id="clueSection" style="display:none;">
    <input id="clueInput" placeholder="Enter your clue">
    <button onclick="submitClue()">Submit</button>
  </div>

  <div id="waitingMessage" style="display:none; font-size:18px; margin-top:20px;">
    Answer sent. Waiting on everyone else…
  </div>

  <div id="clueList"></div>

  <div id="voteSection" style="display:none;">
    <h3>Vote for the Imposter</h3>
    <div id="voteButtons"></div>
  </div>
</div>

<!-- Sliding results panel -->
<div id="resultsPanel"></div>

<script>
const socket = io();
let currentRoom = "";

// CREATE ROOM
function createRoom() {
  const name = document.getElementById("nameInput").value;
  socket.emit("createRoom", name);
}

socket.on("roomCreated", (code) => {
  currentRoom = code;
  document.getElementById("menu").style.display = "none";
  document.getElementById("room").style.display = "block";
  document.getElementById("roomCode").innerText = code;
});

// JOIN ROOM
function joinRoom() {
  const name = document.getElementById("nameInput").value;
  const code = document.getElementById("roomCodeInput").value.toUpperCase();
  socket.emit("joinRoom", { name, code });
}

socket.on("joinedRoom", (code) => {
  currentRoom = code;
  document.getElementById("menu").style.display = "none";
  document.getElementById("room").style.display = "block";
  document.getElementById("roomCode").innerText = code;
});

// UPDATE PLAYER LIST
socket.on("players", (players) => {
  let html = "";
  for (const id in players) {
    html += `<p>${players[id].name}</p>`;
  }
  document.getElementById("playerList").innerHTML = html;
});

// START ROUND
function startRound() {
  socket.emit("startRound", currentRoom);
}

socket.on("role", (data) => {
  document.getElementById("startBtn").style.display = "none";

  if (data.role === "crewmate") {
    document.getElementById("roleDisplay").innerText = "You are a normal person";
    document.getElementById("wordDisplay").innerText = "Word: " + data.word;
  } else {
    document.getElementById("roleDisplay").innerText = "You are the imposter";
    document.getElementById("wordDisplay").innerText = "Hint: " + data.hint;
  }

  document.getElementById("clueSection").style.display = "block";
});

// SUBMIT CLUE
function submitClue() {
  const clue = document.getElementById("clueInput").value;
  socket.emit("submitClue", { code: currentRoom, clue });

  // Hide role + word/hint after submitting
  document.getElementById("roleDisplay").style.display = "none";
  document.getElementById("wordDisplay").style.display = "none";

  // Hide input box and show waiting message
  document.getElementById("clueSection").style.display = "none";
  document.getElementById("waitingMessage").style.display = "block";
}

socket.on("allClues", (players) => {
  document.getElementById("waitingMessage").style.display = "none";

  let html = "<h3>Clues:</h3>";
  for (const id in players) {
    html += `<p>${players[id].name}: ${players[id].clue}</p>`;
  }
  document.getElementById("clueList").innerHTML = html;

  document.getElementById("voteSection").style.display = "block";
  const voteDiv = document.getElementById("voteButtons");
  voteDiv.innerHTML = "";

  for (const id in players) {
    voteDiv.innerHTML += `<button onclick="vote('${id}')">${players[id].name}</button><br>`;
  }
});

// VOTE
function vote(id) {
  socket.emit("submitVote", { code: currentRoom, voteId: id });
}

socket.on("results", (data) => {
  const { votedOut, imposterId, players } = data;

  let html = `<h2>Results</h2>`;
  html += `<p><strong>Voted Out:</strong> ${players[votedOut].name}</p>`;
  html += `<p><strong>Imposter:</strong> ${players[imposterId].name}</p>`;

  if (votedOut === imposterId) {
    html += `<h3>crewmates win</h3>`;
  } else {
    html += `<h3>imposter wins</h3>`;
  }

  const panel = document.getElementById("resultsPanel");
  panel.innerHTML = html;

  // Slide down animation
  panel.classList.add("show");
});
</script>

</body>
</html>
